<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="robots" content="noindex,nofollow"/>
  <title>접속 제한 안내</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#101828;
      --muted:#667085;
      --line:#e4e7ec;
      --accent:#2563eb;
      --warn:#f79009;
      --danger:#d92d20;
      --shadow: 0 18px 50px rgba(16,24,40,.10);
      --radius:16px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic", Arial, sans-serif;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:var(--sans); color:var(--text);
      min-height:100svh; display:grid; place-items:center; padding:24px;
      background:
        radial-gradient(900px 600px at 10% 10%, rgba(37,99,235,.10), transparent 60%),
        radial-gradient(900px 600px at 90% 20%, rgba(247,144,9,.10), transparent 60%),
        var(--bg);
    }
    .card{
      width:min(860px,100%);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .top{
      padding:18px 20px;
      border-bottom:1px solid var(--line);
      display:flex; align-items:flex-start; gap:12px;
    }
    .icon{
      width:40px; height:40px; border-radius:12px;
      background: rgba(37,99,235,.10);
      border:1px solid rgba(37,99,235,.20);
      display:grid; place-items:center;
      flex:0 0 auto;
    }
    .icon svg{width:20px;height:20px}
    h1{margin:0;font-size:18px;letter-spacing:-.2px}
    .sub{margin:4px 0 0; color:var(--muted); font-size:13px; line-height:1.4}
    .body{padding:18px 20px 20px}

    .notice{
      border:1px solid rgba(247,144,9,.35);
      background: rgba(247,144,9,.10);
      border-radius:14px;
      padding:12px 12px;
      display:flex; gap:10px;
    }
    .dot{
      width:10px;height:10px;border-radius:999px;
      background:var(--warn); margin-top:6px;
      box-shadow:0 0 0 6px rgba(247,144,9,.14);
      flex:0 0 auto;
    }
    .notice h2{margin:0; font-size:14px}
    .notice p{margin:6px 0 0; color:var(--muted); font-size:13px; line-height:1.5}

    .grid{
      margin-top:14px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    .kv{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background:#fbfcfe;
    }
    .k{font-size:12px; color:var(--muted); margin-bottom:6px}
    .v{
      font-family:var(--mono);
      font-size:13px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    .actions{
      margin-top:16px;
      display:flex; flex-wrap:wrap; gap:10px;
    }
    .btn{
      border:1px solid var(--line);
      background:#fff;
      padding:10px 12px;
      border-radius:12px;
      font-weight:800;
      font-size:13px;
      color:var(--text);
      cursor:pointer;
      display:inline-flex; align-items:center; gap:8px;
      text-decoration:none;
      transition: transform .05s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .btn:hover{border-color:#d0d5dd; box-shadow:0 10px 22px rgba(16,24,40,.08)}
    .btn:active{transform:translateY(1px)}
    .btn.primary{
      background: rgba(37,99,235,.10);
      border-color: rgba(37,99,235,.25);
      color:#1d4ed8;
    }
    .foot{
      margin-top:14px;
      padding-top:12px;
      border-top:1px solid var(--line);
      display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;
      font-size:12px; color:var(--muted);
    }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      border:1px solid var(--line);
      background:#fff;
      padding:7px 10px;
      border-radius:999px;
      font-family:var(--mono);
      color:var(--text);
    }
    .pill b{color:var(--danger)}
    @media (max-width:720px){
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <section class="card" aria-label="접속 제한 안내">
    <div class="top">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 2l8 4v6c0 5-3.5 9.5-8 10-4.5-.5-8-5-8-10V6l8-4z" stroke="#2563eb" stroke-width="1.8"/>
          <path d="M9 12h6" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <h1>접속 제한 안내</h1>
        <p class="sub">보안/콘텐츠 정책에 의해 요청하신 페이지 접근이 제한되었습니다.</p>
      </div>
    </div>

    <div class="body">
      <div class="notice" role="alert">
        <div class="dot" aria-hidden="true"></div>
        <div>
          <h2 id="reasonTitle">차단 사유: 정책 위반 가능성</h2>
          <p>업무상 필요로 판단되면 “차단 해제 요청”으로 검토를 요청할 수 있습니다.</p>
        </div>
      </div>

      <div class="grid">
        <div class="kv"><div class="k">요청 URL</div><div class="v" id="vUrl">-</div></div>
        <div class="kv"><div class="k">카테고리</div><div class="v" id="vCategory">-</div></div>
        <div class="kv"><div class="k">차단 시각</div><div class="v" id="vTime">-</div></div>
        <div class="kv"><div class="k">요청 ID</div><div class="v" id="vReqId">-</div></div>
      </div>

      <div class="actions">
        <button class="btn primary" id="btnBack" type="button">← 이전으로</button>
        <a class="btn" id="btnHome" href="/">⌂ 홈</a>
        <button class="btn" id="btnCopy" type="button">⧉ 정보 복사</button>
        <a class="btn" id="btnRequest" href="#">✉ 해제 요청</a>
      </div>

      <div class="foot">
        <div class="pill">STATUS: <b id="vStatus">BLOCKED</b></div>
        <div>서비스 자체 안내 페이지 (기관/정부 안내와 무관)</div>
      </div>
    </div>
  </section>

  <script>
    const qs = new URLSearchParams(location.search);
    const safeText = (s, max=180) => {
      if (!s) return "-";
      s = String(s).replace(/\s+/g," ").trim();
      if (s.length > max) s = s.slice(0, max-1) + "…";
      return s;
    };
    const url = qs.get("url") || qs.get("u");
    const category = qs.get("category") || qs.get("c") || "Policy";
    const reason = qs.get("reason") || qs.get("r") || "정책 위반 가능성";
    const reqId = qs.get("req") || qs.get("id") || ("REQ-" + Date.now());
    const status = qs.get("status") || "BLOCKED";

    document.getElementById("vUrl").textContent = safeText(url);
    document.getElementById("vCategory").textContent = safeText(category, 60);
    document.getElementById("vReqId").textContent = safeText(reqId, 80);
    document.getElementById("vStatus").textContent = safeText(status, 20);
    document.getElementById("reasonTitle").textContent = "차단 사유: " + safeText(reason, 80);

    const now = new Date();
    const pad = (n)=> String(n).padStart(2,"0");
    const ts = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    document.getElementById("vTime").textContent = ts;

    document.getElementById("btnBack").addEventListener("click", () => history.length > 1 ? history.back() : location.href="/");

    document.getElementById("btnCopy").addEventListener("click", async () => {
      const payload =
`[Access Restricted]
URL: ${safeText(url)}
Category: ${safeText(category)}
Reason: ${safeText(reason)}
Time: ${ts}
RequestId: ${safeText(reqId)}
Status: ${safeText(status)}`;
      try{ await navigator.clipboard.writeText(payload); alert("복사 완료"); }
      catch(e){ prompt("아래 내용을 복사하세요:", payload); }
    });

    document.getElementById("btnRequest").href =
      "mailto:security@your-company.example"
      + "?subject=" + encodeURIComponent("[차단 해제 요청] " + safeText(reqId))
      + "&body=" + encodeURIComponent(
        `요청 ID: ${safeText(reqId)}\n차단 URL: ${safeText(url)}\n카테고리: ${safeText(category)}\n사유: ${safeText(reason)}\n발생 시각: ${ts}\n\n(사용 목적을 적어주세요)`
      );
  </script>
</body>
</html>
