<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
</head>
<body>
    <h2>로그인</h2>

    {% if messages %}
        {% for message in messages %}
            <p style="color:red;">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        <div>
            <label>아이디</label>
            <input type="text" name="username" required>
        </div>

        <div>
            <label>비밀번호</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit">다음</button>
    </form>
</body>
</html>
