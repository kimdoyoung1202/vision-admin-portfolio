<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTP 인증 | VISION Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet"
    />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        :root{
            --sneat-bg: #f5f6fa;
            --card-bg: #ffffff;
            --text: #566a7f;
            --muted: #a1acb8;
            --primary: #696cff;
            --primary-2: #5f61e6;
            --border: #e7e7ff;
            --shadow: 0 10px 26px rgba(67, 89, 113, 0.14);
        }

        *{ box-sizing: border-box; }
        html, body{ height: 100%; }

        body{
            margin: 0;
            font-family: "Public Sans", system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", sans-serif;
            color: var(--text);
            background: var(--sneat-bg);
        }

        .bg-orb{
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-orb:before,
        .bg-orb:after{
            content:"";
            position:absolute;
            width: 520px;
            height: 520px;
            border-radius: 50%;
            opacity: .22;
            background: radial-gradient(circle at 30% 30%, rgba(105,108,255,.95), rgba(105,108,255,0) 60%);
        }

        .bg-orb:before{
            top: -180px;
            right: -180px;
        }

        .bg-orb:after{
            bottom: -200px;
            left: -200px;
            opacity: .16;
            background: radial-gradient(circle at 30% 30%, rgba(105,108,255,.75), rgba(105,108,255,0) 60%);
        }

        .wrap{
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .otp-card{
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .otp-header{
            padding: 18px 18px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .brand{
            display: flex;
            align-items: center;
            gap: 10px;
            user-select: none;
        }

        .brand-badge{
            width: 40px;
            height: 40px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: rgba(105,108,255,.12);
            border: 1px solid rgba(105,108,255,.22);
            color: var(--primary);
            font-weight: 800;
            letter-spacing: .5px;
        }

        .brand-title{
            font-weight: 800;
            color: #2f3a45;
            line-height: 1.1;
            margin: 0;
            font-size: 16px;
        }

        .brand-sub{
            margin: 2px 0 0;
            font-size: 12px;
            color: var(--muted);
            font-weight: 700;
        }

        .tiny{
            font-size: 12px;
            color: var(--muted);
            font-weight: 700;
        }

        .otp-body{
            padding: 14px 18px 18px;
        }

        .otp-title{
            font-size: 22px;
            font-weight: 800;
            color: #2f3a45;
            margin-bottom: 8px;
        }

        .otp-desc{
            font-size: 13px;
            color: var(--text);
            line-height: 1.6;
            margin-bottom: 18px;
            font-weight: 600;
        }

        .otp-desc strong{
            color: var(--primary);
            word-break: break-all;
        }

        .form-label{
            font-weight: 800;
            font-size: 12px;
            color: #2f3a45;
            margin-bottom: 6px;
        }

        .form-control{
            border-radius: 12px;
            border-color: rgba(105,108,255,.18);
            padding: .7rem .9rem;
            font-weight: 700;
            color: #2f3a45;
        }

        .form-control:focus{
            box-shadow: 0 0 0 .18rem rgba(105,108,255,.16);
            border-color: rgba(105,108,255,.42);
        }

        .btn-primary{
            background: var(--primary);
            border-color: var(--primary);
            border-radius: 12px;
            font-weight: 900;
            padding: .7rem .9rem;
        }

        .btn-primary:hover{
            background: var(--primary-2);
            border-color: var(--primary-2);
        }

        .alert{
            border-radius: 14px;
            font-weight: 800;
            font-size: 13px;
        }

        .helper-box{
            background: rgba(105,108,255,.06);
            border: 1px solid rgba(105,108,255,.12);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 16px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text);
        }

        .footer-note{
            padding: 12px 18px 16px;
            border-top: 1px dashed rgba(105,108,255,.18);
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            display:flex;
            align-items:center;
            justify-content: space-between;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="bg-orb"></div>

    <div class="wrap">
        <div class="otp-card">

            <div class="otp-header">
                <div class="brand">
                    <div class="brand-badge">V</div>
                    <div>
                        <p class="brand-title mb-0">VISION Admin</p>
                        <p class="brand-sub mb-0">2단계 인증 확인</p>
                    </div>
                </div>
                <div class="tiny">
                    <i class="bx bx-shield-quarter"></i> OTP
                </div>
            </div>

            <div class="otp-body">
                <div class="otp-title">OTP 인증</div>
                <div class="otp-desc">
                    <strong>{{ email }}</strong>로 전송된 6자리 인증 코드를 입력하세요.
                </div>


                <div class="helper-box">
                    <i class="bx bx-info-circle"></i>
                    메일이 보이지 않으면 스팸함도 함께 확인해 주세요.
                </div>

                <form method="post" >
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="id_otp">OTP 코드</label>
                        <input
                            type="text"
                            name="otp"
                            id="id_otp"
                            maxlength="6"
                            class="form-control"
                            placeholder="6자리 인증 코드 입력"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bx bx-check-shield"></i> 로그인 완료
                    </button>
                </form>
            </div>

            <div class="footer-note">
                <span>© VISION</span>
                <span><i class="bx bx-lock-alt"></i> Secure Verification</span>
            </div>

        </div>
    </div>
</body>
</html>
